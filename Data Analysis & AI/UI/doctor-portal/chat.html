<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages - MamaCare Doctor Portal</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/doctor-style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" id="sidebarClose">
          <i class="fas fa-times"></i>
        </button>
        <div class="logo">
          <i class="fas fa-user-md"></i>
          <span>MamaCare</span>
          <span class="portal-badge">Doctor</span>
        </div>
        <nav class="nav-menu">
          <a href="index.html" class="nav-item" data-tooltip="Dashboard">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
          </a>
          <a href="schedule.html" class="nav-item" data-tooltip="My Schedule">
            <i class="fas fa-calendar-alt"></i>
            <span>My Schedule</span>
          </a>
          <a href="patients.html" class="nav-item" data-tooltip="My Patients">
            <i class="fas fa-users"></i>
            <span>My Patients</span>
          </a>
          <a href="chat.html" class="nav-item active" data-tooltip="Messages">
            <i class="fas fa-comments"></i>
            <span>Messages</span>
          </a>
          <a href="clinic-team.html" class="nav-item" data-tooltip="Clinic Team">
            <i class="fas fa-user-nurse"></i>
            <span>Clinic Team</span>
          </a>
          <a href="analytics.html" class="nav-item" data-tooltip="Analytics">
            <i class="fas fa-chart-line"></i>
            <span>Analytics</span>
          </a>
          <a href="profile.html" class="nav-item" data-tooltip="My Profile">
            <i class="fas fa-user-cog"></i>
            <span>My Profile</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <a href="../patient-portal/index.html" class="nav-item" data-tooltip="Back to Patient Portal">
            <i class="fas fa-exchange-alt"></i>
            <span>Patient Portal</span>
          </a>
        </div>
      </aside>

      <!-- Sidebar Toggle Button -->
      <button class="sidebar-toggle">
        <i class="fas fa-chevron-left"></i>
      </button>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        <h1 class="page-title">Messages</h1>
        <div class="top-bar-actions">
          <button class="notification-btn" id="notificationBtn">
            <i class="fas fa-bell"></i>
            <span class="badge" id="notificationBadge">3</span>
          </button>
          <div class="user-menu">
            <img
              src="../images/doctor-avatar.png"
              alt="Doctor"
              onerror="
                this.src =
                  'https://ui-avatars.com/api/?name=Dr+Sarah&background=0077b6&color=fff'
              "
            />
            <span id="doctorName">Dr. Sarah</span>
          </div>
        </div>
      </header>

      <!-- Notifications Panel -->
      <div class="notifications-panel" id="notificationsPanel">
        <div class="notifications-header">
          <h3>Notifications</h3>
          <button class="mark-all-read">Mark all as read</button>
        </div>
        <div class="notifications-list" id="notificationsList">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Chat Container -->
      <div class="chat-container">
        <!-- Conversations List -->
        <div class="conversations-panel">
          <div class="conversations-header">
            <div class="search-conversations">
              <i class="fas fa-search"></i>
              <input
                type="text"
                placeholder="Search conversations..."
                id="searchConversations"
              />
            </div>
            <div class="conversation-filters">
              <button class="filter-chip active" data-filter="all">All</button>
              <button class="filter-chip" data-filter="unread">Unread</button>
              <button class="filter-chip" data-filter="priority">
                Priority
              </button>
            </div>
          </div>
          <div class="conversations-list" id="conversationsList">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
          <!-- Empty State -->
          <div class="chat-empty-state" id="chatEmptyState">
            <i class="fas fa-comments"></i>
            <h3>Select a conversation</h3>
            <p>Choose a patient from the list to start messaging</p>
          </div>

          <!-- Active Chat (hidden by default) -->
          <div class="active-chat" id="activeChat" style="display: none">
            <!-- Chat Header -->
            <div class="chat-header">
              <button class="back-to-list" id="backToList">
                <i class="fas fa-arrow-left"></i>
              </button>
              <div class="chat-patient-info">
                <img id="chatPatientAvatar" src="" alt="Patient" />
                <div>
                  <h4 id="chatPatientName">Patient Name</h4>
                  <span class="patient-status" id="chatPatientStatus">
                    <span class="status-dot"></span>
                    <span id="statusText">Offline</span>
                  </span>
                </div>
              </div>
              <div class="chat-header-actions">
                <button
                  class="header-action-btn"
                  onclick="viewPatientDetails()"
                  title="View Patient"
                >
                  <i class="fas fa-user"></i>
                </button>
                <button
                  class="header-action-btn"
                  onclick="scheduleVisit()"
                  title="Schedule Visit"
                >
                  <i class="fas fa-calendar-plus"></i>
                </button>
                <button
                  class="header-action-btn"
                  onclick="togglePriority()"
                  title="Mark Priority"
                  id="priorityBtn"
                >
                  <i class="fas fa-flag"></i>
                </button>
              </div>
            </div>

            <!-- Patient Quick Info Bar -->
            <div class="patient-quick-bar">
              <div class="quick-info">
                <span
                  ><i class="fas fa-baby"></i>
                  <span id="quickGestationalAge">-- weeks</span></span
                >
                <span
                  ><i class="fas fa-exclamation-triangle"></i>
                  <span id="quickRiskLevel">-- risk</span></span
                >
                <span
                  ><i class="fas fa-calendar-check"></i> Next:
                  <span id="quickNextAppt">--</span></span
                >
              </div>
              <button class="expand-info-btn" id="expandInfoBtn">
                <i class="fas fa-chevron-down"></i>
              </button>
            </div>

            <!-- Messages Area -->
            <div class="messages-area" id="messagesArea">
              <!-- Messages will be populated here -->
            </div>

            <!-- Quick Replies -->
            <div class="quick-replies" id="quickReplies">
              <span class="quick-replies-label">Quick replies:</span>
              <button
                class="quick-reply-chip"
                data-message="Your test results look normal. Keep up the good work!"
              >
                Results normal ✓
              </button>
              <button
                class="quick-reply-chip"
                data-message="Please schedule your next appointment at your earliest convenience."
              >
                Schedule appointment
              </button>
              <button
                class="quick-reply-chip"
                data-message="Please continue monitoring and let me know if there are any changes."
              >
                Continue monitoring
              </button>
              <button
                class="quick-reply-chip"
                data-message="If symptoms persist, please come in for an examination."
              >
                Come in if persists
              </button>
            </div>

            <!-- Message Input -->
            <div class="message-input-area">
              <div class="input-actions">
                <button
                  class="input-action-btn"
                  title="Attach file"
                  onclick="showAttachmentOptions()"
                >
                  <i class="fas fa-paperclip"></i>
                </button>
                <button
                  class="input-action-btn"
                  title="Send template"
                  onclick="showTemplates()"
                >
                  <i class="fas fa-file-alt"></i>
                </button>
              </div>
              <div class="message-input-wrapper">
                <textarea
                  id="messageInput"
                  placeholder="Type your message..."
                  rows="1"
                ></textarea>
              </div>
              <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Templates Modal -->
    <div class="modal-overlay" id="templatesModal">
      <div class="modal">
        <div class="modal-header">
          <h3>Message Templates</h3>
          <button class="modal-close" onclick="closeTemplatesModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="templates-list" id="templatesList">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>

    <script src="../shared/js/shared.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/chat.js"></script>
  </body>
</html>
